<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskList.</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #18181f;
      --surface2: #22222c;
      --border: #2e2e3a;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --accent-glow: rgba(124, 106, 247, 0.18);
      --text: #f0f0f5;
      --text-muted: #8888a0;
      --text-dim: #55556a;
      --green: #34d399;
      --orange: #fb923c;
      --red: #f87171;
      --yellow: #fbbf24;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* AUTH PAGE */
    #auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: radial-gradient(ellipse at 60% 20%, rgba(124,106,247,0.12) 0%, transparent 60%);
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .auth-logo span { color: var(--accent2); }

    .auth-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      color: var(--text-muted);
      transition: all 0.2s;
      border: none;
      background: none;
    }

    .auth-tab.active {
      background: var(--accent);
      color: white;
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--red);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    /* APP LAYOUT */
    #app-page { display: none; min-height: 100vh; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .topbar-logo span { color: var(--accent2); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-email {
      font-size: 13px;
      color: var(--text-muted);
    }

    .btn-logout {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .main-content {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ADD TASK CARD */
    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 28px;
    }

    .add-card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
    }

    .add-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .add-row .form-input {
      flex: 1;
    }

    .add-meta {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .add-meta select,
    .add-meta input[type="date"] {
      flex: 1;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
    }

    .add-meta select:focus,
    .add-meta input[type="date"]:focus { border-color: var(--accent); }

    .add-meta option { background: var(--surface2); }

    .btn-add {
      padding: 10px 22px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .btn-add:hover { opacity: 0.88; }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* FILTERS */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-chip {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }

    .filter-chip.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent2);
    }

    .filter-sep { flex: 1; }

    .filter-search {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      width: 200px;
    }

    .filter-search:focus { border-color: var(--accent); }

    /* TASK LIST */
    .tasks-section { margin-bottom: 24px; }

    .section-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.18s, background 0.18s;
      position: relative;
    }

    .task-item:hover { border-color: #3e3e50; background: #1c1c24; }

    .task-item.completed { opacity: 0.55; }

    .task-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      background: transparent;
    }

    .task-check:hover { border-color: var(--accent); }

    .task-check.checked {
      background: var(--green);
      border-color: var(--green);
    }

    .task-check.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-item.completed .task-title { text-decoration: line-through; color: var(--text-dim); }

    .task-meta {
      display: flex;
      gap: 10px;
      margin-top: 5px;
      align-items: center;
      flex-wrap: wrap;
    }

    .cat-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      background: var(--accent-glow);
      color: var(--accent2);
      border: 1px solid rgba(124,106,247,0.3);
    }

    .cat-badge.work { background: rgba(251,191,36,0.1); color: var(--yellow); border-color: rgba(251,191,36,0.3); }
    .cat-badge.personal { background: rgba(52,211,153,0.1); color: var(--green); border-color: rgba(52,211,153,0.3); }
    .cat-badge.shopping { background: rgba(251,146,60,0.1); color: var(--orange); border-color: rgba(251,146,60,0.3); }
    .cat-badge.health { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.3); }
    .cat-badge.other { background: rgba(136,136,160,0.1); color: var(--text-muted); border-color: rgba(136,136,160,0.3); }

    .due-label {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .due-label.overdue { color: var(--red); }
    .due-label.soon { color: var(--orange); }
    .due-label.today { color: var(--yellow); }

    .task-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .task-item:hover .task-actions { opacity: 1; }

    .icon-btn {
      width: 30px;
      height: 30px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
      color: var(--text-muted);
    }

    .icon-btn:hover.edit { border-color: var(--accent); color: var(--accent2); }
    .icon-btn:hover.delete { border-color: var(--red); color: var(--red); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .empty-sub { font-size: 14px; }

    /* EDIT MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
    }

    .modal-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 22px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      padding: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-save {
      flex: 1;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 14px;
      color: var(--text);
      z-index: 300;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(52,211,153,0.4); color: var(--green); }
    .toast.error { border-color: rgba(248,113,113,0.4); color: var(--red); }

    /* STATS ROW */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .stat-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label { font-size: 12px; color: var(--text-muted); }

    /* LOADING */
    .loading-spinner {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 14px;
    }

    /* SUPABASE CONFIG NOTICE */
    .config-notice {
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.3);
      color: var(--yellow);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .config-notice code {
      background: rgba(251,191,36,0.15);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: monospace;
    }

    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .main-content { padding: 20px 16px; }
      .stats-row { gap: 8px; }
      .add-meta { flex-wrap: wrap; }
      .filter-bar { gap: 6px; }
      .filter-search { width: 100%; }
      .filter-sep { display: none; }
    }
  </style>
</head>
<body>

<!-- ======= AUTH PAGE ======= -->
<div id="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Task<span>List</span></div>


    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" id="auth-email" class="form-input" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="auth-password" class="form-input" placeholder="••••••••" />
    </div>

    <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Sign In</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ======= APP PAGE ======= -->
<div id="app-page">
  <nav class="topbar">
    <div class="topbar-logo">Task<span>List</span></div>
    <div class="topbar-right">
      <span class="user-email" id="user-email-display"></span>
      <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </nav>

  <div class="main-content">
    <!-- Config Notice -->
    <div class="config-notice" id="config-notice">
      ⚠️  This is Debugging mode    ⚠️ 
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-total" style="color: var(--accent2)">0</div>
        <div class="stat-label">งานทั้งหมด</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-done" style="color: var(--green)">0</div>
        <div class="stat-label">เสร็จแล้ว</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-pending" style="color: var(--orange)">0</div>
        <div class="stat-label">ยังค้างอยู่</div>
      </div>
    </div>

    <!-- Add Task -->
    <div class="add-card">
      <div class="add-card-title">เพิ่มงานใหม่</div>
      <div class="add-row">
        <input type="text" id="new-task-title" class="form-input" placeholder="ชื่องาน..." onkeydown="if(event.key==='Enter') addTask()" />
        <button class="btn-add" onclick="addTask()" id="add-btn">+ เพิ่ม</button>
      </div>
      <div class="add-meta">
        <select id="new-task-category">
          <option value="other">📌 ทั่วไป</option>
          <option value="work">💼 งาน</option>
          <option value="personal">🏠 ส่วนตัว</option>
          <option value="shopping">🛒 ซื้อของ</option>
        </select>
        <input type="date" id="new-task-due" />
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">ทั้งหมด</button>
      <button class="filter-chip" data-filter="pending" onclick="setFilter('pending', this)">ยังค้าง</button>
      <button class="filter-chip" data-filter="completed" onclick="setFilter('completed', this)">เสร็จแล้ว</button>
      <button class="filter-chip" data-filter="overdue" onclick="setFilter('overdue', this)">เกินกำหนด</button>
      <div class="filter-sep"></div>
      <input class="filter-search" type="text" placeholder="🔍 ค้นหา..." oninput="renderTasks()" id="search-input" />
    </div>

    <!-- Task List -->
    <div id="tasks-container">
      <div class="loading-spinner">กำลังโหลด...</div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-card">
    <div class="modal-title">✏️ แก้ไขงาน</div>
    <input type="hidden" id="edit-task-id" />
    <div class="form-group">
      <label class="form-label">ชื่องาน</label>
      <input type="text" id="edit-title" class="form-input" />
    </div>
    <div class="form-group">
      <label class="form-label">หมวดหมู่</label>
      <select id="edit-category" class="form-input">
        <option value="other">📌 ทั่วไป</option>
        <option value="work">💼 งาน</option>
        <option value="personal">🏠 ส่วนตัว</option>
        <option value="shopping">🛒 ซื้อของ</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">กำหนดเสร็จ</label>
      <input type="date" id="edit-due" class="form-input" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">ยกเลิก</button>
      <button class="btn-save" onclick="saveEdit()">บันทึก</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // =========================================================
  //  ⚙️  CONFIG — แก้ไขค่านี้ก่อนใช้งาน
  // =========================================================
  // demo
  // const SUPABASE_URL  = 'https://YOUR_PROJECT_ID.supabase.co';
  // const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';

  // used
   const SUPABASE_URL  = 'https://jmsehdsibgwgucjkodiv.supabase.co';
   const SUPABASE_ANON_KEY = 'sb_publishable_lpyXLzaMgiCYBOIttjcOoA_Tu9jiu9f';
  // =========================================================

  const IS_CONFIGURED = !SUPABASE_URL.includes('YOUR_PROJECT') && !SUPABASE_ANON_KEY.includes('YOUR_ANON');

  const { createClient } = supabase;
  let sb, currentUser, allTasks = [], currentFilter = 'all';

  if (IS_CONFIGURED) {
    sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    document.getElementById('config-notice').style.display = 'none';
  }

  // =========================================================
  //  INIT
  // =========================================================
  async function init() {
    if (!IS_CONFIGURED) {
      showApp({ email: 'demo@example.com' });
      allTasks = getDemoTasks();
      renderTasks();
      updateStats();
      return;
    }
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) {
      showApp(session.user);
      await fetchTasks();
    }
    sb.auth.onAuthStateChange((_event, session) => {
      if (session?.user) {
        showApp(session.user);
        fetchTasks();
      } else {
        showAuth();
      }
    });
  }

  function showAuth() {
    document.getElementById('auth-page').style.display = 'flex';
    document.getElementById('app-page').style.display = 'none';
  }

  function showApp(user) {
    currentUser = user;
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('app-page').style.display = 'block';
    document.getElementById('user-email-display').textContent = user.email;
  }

  // =========================================================
  //  AUTH
  // =========================================================
  let authMode = 'login';

  function switchTab(mode) {
    authMode = mode;
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (mode === 'login' && i === 0) || (mode === 'register' && i === 1));
    });
    document.getElementById('auth-btn').textContent = mode === 'login' ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
    document.getElementById('auth-error').style.display = 'none';
  }

  async function handleAuth() {
    if (!IS_CONFIGURED) { showToast('กรุณาตั้งค่า Supabase ก่อน', 'error'); return; }
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const btn = document.getElementById('auth-btn');
    const errEl = document.getElementById('auth-error');

    if (!email || !password) { showError('กรุณากรอกอีเมลและรหัสผ่าน'); return; }

    btn.disabled = true;
    btn.textContent = 'กำลังดำเนินการ...';

    let result;
    if (authMode === 'login') {
      result = await sb.auth.signInWithPassword({ email, password });
    } else {
      result = await sb.auth.signUp({ email, password });
    }

    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';

    if (result.error) {
      showError(result.error.message);
    } else if (authMode === 'register') {
      errEl.style.display = 'block';
      errEl.style.color = 'var(--green)';
      errEl.style.background = 'rgba(52,211,153,0.08)';
      errEl.style.borderColor = 'rgba(52,211,153,0.3)';
      errEl.textContent = '✅ สมัครสมาชิกสำเร็จ! กรุณายืนยันอีเมลก่อนเข้าสู่ระบบ';
    }
  }

  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.style.display = 'block';
    el.style.color = 'var(--red)';
    el.style.background = 'rgba(248,113,113,0.08)';
    el.style.borderColor = 'rgba(248,113,113,0.3)';
    el.textContent = msg;
  }

  async function handleLogout() {
    if (IS_CONFIGURED) await sb.auth.signOut();
    else showAuth();
  }

  // =========================================================
  //  TASKS — CRUD
  // =========================================================
  async function fetchTasks() {
    document.getElementById('tasks-container').innerHTML = '<div class="loading-spinner">กำลังโหลด...</div>';
    const { data, error } = await sb
      .from('todos')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { showToast('โหลดข้อมูลล้มเหลว', 'error'); return; }
    allTasks = data || [];
    renderTasks();
    updateStats();
  }

  async function addTask() {
    const titleEl = document.getElementById('new-task-title');
    const title = titleEl.value.trim();
    if (!title) { titleEl.focus(); return; }

    const category = document.getElementById('new-task-category').value;
    const due_date = document.getElementById('new-task-due').value || null;
    const btn = document.getElementById('add-btn');
    btn.disabled = true;

    if (!IS_CONFIGURED) {
      const task = { id: Date.now(), title, category, due_date, is_completed: false, created_at: new Date().toISOString() };
      allTasks.unshift(task);
    } else {
      const { data, error } = await sb.from('todos').insert([{
        title, category, due_date, is_completed: false, user_id: currentUser.id
      }]).select().single();
      if (error) { showToast('เพิ่มงานล้มเหลว', 'error'); btn.disabled = false; return; }
      allTasks.unshift(data);
    }

    titleEl.value = '';
    document.getElementById('new-task-due').value = '';
    btn.disabled = false;
    renderTasks();
    updateStats();
    showToast('เพิ่มงานสำเร็จ ✓', 'success');
  }

  async function toggleTask(id) {
    const task = allTasks.find(t => t.id === id);
    if (!task) return;
    const newVal = !task.is_completed;

    if (IS_CONFIGURED) {
      const { error } = await sb.from('todos').update({ is_completed: newVal }).eq('id', id);
      if (error) { showToast('อัปเดตล้มเหลว', 'error'); return; }
    }
    task.is_completed = newVal;
    renderTasks();
    updateStats();
  }

  async function deleteTask(id) {
    if (!confirm('ต้องการลบงานนี้ใช่ไหม?')) return;
    if (IS_CONFIGURED) {
      const { error } = await sb.from('todos').delete().eq('id', id);
      if (error) { showToast('ลบล้มเหลว', 'error'); return; }
    }
    allTasks = allTasks.filter(t => t.id !== id);
    renderTasks();
    updateStats();
    showToast('ลบงานแล้ว', 'success');
  }

  function openEditModal(id) {
    const task = allTasks.find(t => t.id === id);
    if (!task) return;
    document.getElementById('edit-task-id').value = id;
    document.getElementById('edit-title').value = task.title;
    document.getElementById('edit-category').value = task.category || 'other';
    document.getElementById('edit-due').value = task.due_date || '';
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  async function saveEdit() {
    const id = document.getElementById('edit-task-id').value;
    const title = document.getElementById('edit-title').value.trim();
    const category = document.getElementById('edit-category').value;
    const due_date = document.getElementById('edit-due').value || null;
    if (!title) return;

    const task = allTasks.find(t => String(t.id) === String(id));
    if (!task) return;

    if (IS_CONFIGURED) {
      const { error } = await sb.from('todos').update({ title, category, due_date }).eq('id', id);
      if (error) { showToast('แก้ไขล้มเหลว', 'error'); return; }
    }
    task.title = title;
    task.category = category;
    task.due_date = due_date;
    closeEditModal();
    renderTasks();
    showToast('แก้ไขสำเร็จ ✓', 'success');
  }

  // =========================================================
  //  RENDER
  // =========================================================
  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderTasks();
  }

  function getFilteredTasks() {
    const search = (document.getElementById('search-input')?.value || '').toLowerCase();
    const today = new Date(); today.setHours(0,0,0,0);
    return allTasks.filter(t => {
      if (search && !t.title.toLowerCase().includes(search)) return false;
      if (currentFilter === 'pending') return !t.is_completed;
      if (currentFilter === 'completed') return t.is_completed;
      if (currentFilter === 'overdue') {
        if (!t.due_date || t.is_completed) return false;
        return new Date(t.due_date) < today;
      }
      return true;
    });
  }

  function getDueLabelHtml(due_date, is_completed) {
    if (!due_date) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(due_date);
    const diff = Math.round((due - today) / 86400000);
    let cls = '', label = '';
    if (diff < 0) { cls = is_completed ? '' : 'overdue'; label = `เกิน ${Math.abs(diff)} วัน`; }
    else if (diff === 0) { cls = 'today'; label = 'วันนี้'; }
    else if (diff <= 2) { cls = 'soon'; label = `อีก ${diff} วัน`; }
    else { label = due.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }); }
    return `<span class="due-label ${cls}">📅 ${label}</span>`;
  }

  const CAT_LABELS = { work: '💼 งาน', personal: '🏠 ส่วนตัว', shopping: '🛒 ซื้อของ',  other: '📌 ทั่วไป' };

  function renderTasks() {
    const tasks = getFilteredTasks();
    const container = document.getElementById('tasks-container');
    if (!tasks.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🗒️</div><div class="empty-title">ไม่มีงานในหมวดนี้</div><div class="empty-sub">เพิ่มงานใหม่ด้านบนได้เลย</div></div>`;
      return;
    }
    const pending = tasks.filter(t => !t.is_completed);
    const done = tasks.filter(t => t.is_completed);
    let html = '';
    if (pending.length) {
      html += `<div class="tasks-section"><div class="section-header">ค้างอยู่ · ${pending.length}</div>${pending.map(taskHtml).join('')}</div>`;
    }
    if (done.length) {
      html += `<div class="tasks-section"><div class="section-header">เสร็จแล้ว · ${done.length}</div>${done.map(taskHtml).join('')}</div>`;
    }
    container.innerHTML = html;
  }

  function taskHtml(t) {
    const catClass = t.category || 'other';
    const catLabel = CAT_LABELS[catClass] || '📌 ทั่วไป';
    const safeId = String(t.id);
    return `
      <div class="task-item ${t.is_completed ? 'completed' : ''}">
        <div class="task-check ${t.is_completed ? 'checked' : ''}" data-id="${safeId}" onclick="toggleTask(this.dataset.id)"></div>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">
            <span class="cat-badge ${catClass}">${catLabel}</span>
            ${getDueLabelHtml(t.due_date, t.is_completed)}
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn edit" data-id="${safeId}" onclick="openEditModal(this.dataset.id)">✏️</button>
          <button class="icon-btn delete" data-id="${safeId}" onclick="deleteTask(this.dataset.id)">🗑️</button>
        </div>
      </div>`;
  }

  function updateStats() {
    const total = allTasks.length;
    const done = allTasks.filter(t => t.is_completed).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-pending').textContent = total - done;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // =========================================================
  //  TOAST
  // =========================================================
  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // =========================================================
  //  DEMO DATA (when not configured)
  // =========================================================
  function getDemoTasks() {
    const today = new Date().toISOString().split('T')[0];
    const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    return [
      { id: 1, title: 'topic 1', category: 'work', due_date: today, is_completed: false, created_at: new Date().toISOString() },
      { id: 2, title: 'topic 2', category: 'shopping', due_date: tomorrow, is_completed: false, created_at: new Date().toISOString() },
      { id: 3, title: 'topic 3', category: 'work', due_date: yesterday, is_completed: false, created_at: new Date().toISOString() },
      { id: 4, title: 'topic 4', category: 'personal', due_date: null, is_completed: false, created_at: new Date().toISOString() },
    ];
  }

  // =========================================================
  //  CLOSE MODAL ON OVERLAY CLICK
  // =========================================================
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  // =========================================================
  //  START
  // =========================================================
  init();
</script>
</body>
</html>
